<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Confort y Playa</title>
    <link rel="stylesheet" href="Assets/Css/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="Assets/Css/main.css">
    <link rel="shortcut icon" href="Assets/Img/confort y playa logo.png" type="image/x-icon">
</head>

<body class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h3">Panel Admin</h1>
                <div>
                    <button id="btn-logout" class="btn btn-outline-secondary" style="display:none;">Cerrar
                        sesión</button>
                </div>
            </div>

            <section id="auth-section" class="mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Iniciar sesión</h5>
                        <form id="login-form" class="row g-2 align-items-center">
                            <div class="col-md-5">
                                <input id="email" type="email" class="form-control" placeholder="Email" required />
                            </div>
                            <div class="col-md-5">
                                <input id="password" type="password" class="form-control" placeholder="Contraseña"
                                    required />
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-primary w-100" id="btn-login">Entrar</button>
                            </div>
                        </form>
                        <div id="auth-msg" class="mt-2 text-muted small"></div>
                    </div>
                </div>
            </section>

            <section id="admin-panel" style="display:none;">
                <div class="card shadow-sm mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Crear nueva card</h5>
                        <form id="card-form" class="row g-2">
                            <div class="col-12">
                                <input id="card-title" class="form-control" placeholder="Título" required />
                            </div>
                            <div class="col-12">
                                <textarea id="card-desc" class="form-control" rows="3"
                                    placeholder="Descripción"></textarea>
                            </div>
                            <div class="col-md-8">
                                <input id="card-image" type="file" accept="image/*" class="form-control" />
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-success w-100" id="btn-create">Crear card</button>
                            </div>
                        </form>
                        <div id="admin-msg" class="mt-3"></div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Cards existentes</h5>
                        <div id="cards-list">
                            <!-- Lista de cards con editar/eliminar -->
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script type="module" src="Assets/Js/main.js"></script>
</body>

</html>
